services:
  postgres:
    image: postgres:16-alpine
    container_name: taskboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskboard}
      POSTGRES_DB: ${POSTGRES_DB:-taskboard}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - taskboard-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskboard} -d ${POSTGRES_DB:-taskboard}"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  taskboard-pgdata:
